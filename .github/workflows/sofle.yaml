name: 'Build Sofle'
on: workflow_dispatch
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["nice_nano_v2"]'
      shield: '["sofle_left","sofle_right"]'
      alphas: '["qwertz"]'
      nav: '["vi"]'
      clipboard: '["mac"]'
